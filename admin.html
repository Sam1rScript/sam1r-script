<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam1r Script - Админ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-layout { display: none; }
        .admin-layout.active { display: block; }
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-overlay.hidden { display: none; }
        .auth-box {
            background: rgba(20,20,30,0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .auth-box h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-box p {
            color: rgba(255,255,255,0.4);
            font-size: 15px;
            margin-bottom: 28px;
        }
        .auth-box input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: #ffffff;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }
        .auth-box input:focus {
            border-color: rgba(139,92,246,0.4);
            background: rgba(255,255,255,0.06);
        }
        .auth-box input::placeholder {
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
        .auth-box .auth-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            min-height: 24px;
        }
        .auth-box .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 12px;
        }
        .auth-box .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139,92,246,0.3);
        }
        .admin-header {
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }
        .admin-header .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }
        .admin-header .logo-text .logo-accent {
            color: #8b5cf6;
        }
        .admin-header .back-link {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }
        .admin-header .back-link:hover {
            color: #ffffff;
        }
        .admin-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px 40px;
        }
        .admin-main .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .admin-panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 24px;
            margin-top: 16px;
        }
        .admin-panel h3 {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 16px;
        }
        .admin-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .admin-form .full-width {
            grid-column: 1 / -1;
        }
        .admin-form label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            display: block;
            margin-bottom: 4px;
        }
        .admin-form input,
        .admin-form textarea,
        .admin-form select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }
        .admin-form input[type="file"] {
            padding: 8px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .admin-form input[type="file"]::-webkit-file-upload-button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            background: rgba(139,92,246,0.2);
            color: #8b5cf6;
            font-weight: 500;
            cursor: pointer;
        }
        .admin-form textarea {
            min-height: 70px;
            resize: vertical;
        }
        .admin-form input:focus,
        .admin-form textarea:focus,
        .admin-form select:focus {
            border-color: rgba(139,92,246,0.3);
            background: rgba(255,255,255,0.05);
        }
        .admin-form select option {
            background: #1a1a2e;
        }
        .admin-submit {
            grid-column: 1 / -1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .admin-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        }
        .btn-primary {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        }
        .btn-danger {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: rgba(239,68,68,0.15);
            color: #ef4444;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.25);
        }
        .script-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            gap: 16px;
            margin-bottom: 8px;
        }
        .script-card:hover {
            border-color: rgba(139,92,246,0.15);
            background: rgba(255,255,255,0.05);
        }
        .script-card .script-info {
            flex: 1;
            min-width: 0;
        }
        .script-card .script-name {
            font-size: 16px;
            font-weight: 600;
        }
        .script-card .script-tag {
            font-size: 11px;
            font-weight: 500;
            background: rgba(139,92,246,0.15);
            color: #8b5cf6;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
        }
        .script-card .script-mode-tag {
            font-size: 11px;
            font-weight: 500;
            background: rgba(6,182,212,0.15);
            color: #06b6d4;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 6px;
        }
        .script-card .script-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-top: 4px;
        }
        .script-card .script-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(139,92,246,0.95);
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            z-index: 99999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.success {
            background: rgba(52,211,153,0.95);
        }
        .toast.error {
            background: rgba(239,68,68,0.95);
        }
        .status-bar {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-bar .status-text {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        .status-bar .status-text .ok {
            color: #34d399;
        }
        .status-bar .status-text .error {
            color: #ef4444;
        }
        .status-bar .status-text .loading {
            color: #fbbf24;
        }
        @media (max-width: 768px) {
            .admin-form {
                grid-template-columns: 1fr;
            }
            .admin-form .full-width {
                grid-column: 1;
            }
            .script-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .script-card .script-actions {
                width: 100%;
                justify-content: flex-start;
            }
            .auth-box {
                padding: 32px 24px;
            }
            .auth-box h2 {
                font-size: 22px;
            }
        }
        @media (max-width: 480px) {
            .admin-main {
                padding: 70px 16px 30px;
            }
            .auth-box {
                padding: 24px 16px;
            }
            .auth-box h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2>Доступ к админке</h2>
            <p>Введите ключ для входа в панель управления</p>
            <input type="password" id="adminKey" placeholder="Введите ключ" onkeydown="if(event.key==='Enter') checkAdminKey()">
            <div class="auth-error" id="authError"></div>
            <button class="auth-btn" onclick="checkAdminKey()">Войти</button>
        </div>
    </div>

    <div class="admin-layout" id="adminLayout">

        <header class="admin-header">
            <div class="logo-text">Sam1r <span class="logo-accent">Script</span></div>
            <a href="index.html" class="back-link">На главную</a>
        </header>

        <main class="admin-main">

            <div class="section-title">Админ-панель</div>

            <div class="status-bar">
                <span class="status-text" id="statusText">Подключение к GitHub...</span>
                <button class="btn-primary" onclick="syncData()" style="padding: 4px 14px; font-size: 12px;">Синхронизировать</button>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:8px;">
                <input type="password" id="githubToken" placeholder="GitHub Token" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#fff;font-size:12px;outline:none;flex:1;min-width:150px;">
                <button class="btn-primary" onclick="setToken()" style="padding:4px 14px;font-size:12px;">Установить</button>
            </div>
            </div>

            <div class="admin-panel">
                <h3>Добавить скрипт</h3>
                <div class="admin-form">
                    <div class="full-width">
                        <label>Название скрипта</label>
                        <input type="text" id="scriptName" placeholder="Например: Infinite Yield">
                    </div>
                    <div class="full-width">
                        <label>Описание</label>
                        <textarea id="scriptDesc" placeholder="Краткое описание скрипта..."></textarea>
                    </div>
                    <div>
                        <label>Категория</label>
                        <select id="scriptCategory">
                            <option value="фарм">Фарм</option>
                            <option value="админ">Админ</option>
                            <option value="aim">Aim</option>
                            <option value="esp">ESP</option>
                            <option value="другое">Другое</option>
                        </select>
                    </div>
                    <div>
                        <label>Режим</label>
                        <select id="scriptMode" onchange="toggleCustomGame()">
                            <option value="doors">DOORS</option>
                            <option value="sab">SAB</option>
                            <option value="gag">GAG 2</option>
                            <option value="bloxfruits">BLOX FRUITS</option>
                            <option value="arsenal">ARSENAL</option>
                            <option value="other">Другое</option>
                        </select>
                    </div>
                    <div class="full-width" id="customGameGroup" style="display: none;">
                        <label>Название игры</label>
                        <input type="text" id="customGameInput" placeholder="Введите название игры...">
                    </div>
                    <div>
                        <label>Дата</label>
                        <input type="date" id="scriptDate">
                    </div>
                    <div>
                        <label>Картинка скрипта</label>
                        <input type="file" id="scriptImage" accept="image/*">
                    </div>
                    <div class="full-width">
                        <label>Код скрипта</label>
                        <textarea id="scriptCode" placeholder="Вставьте код скрипта..."></textarea>
                    </div>
                    <button class="admin-submit" onclick="saveScript()">Сохранить скрипт</button>
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.06);">
                <button class="btn-primary" onclick="exportData()">Экспорт данных</button>
                <button class="btn-primary" onclick="document.getElementById('importInput').click()">Импорт данных</button>
                <input type="file" id="importInput" accept=".json" style="display:none;" onchange="importData(event)">
                <button class="btn-danger" onclick="clearAllData()">Очистить все</button>
            </div>

            <div style="margin-top: 30px;">
                <h3 style="color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 12px;">Управление скриптами</h3>
                <div id="adminScriptsList"></div>
            </div>

        </main>

    </div>

    <div class="toast" id="toast"></div>

    <script src="admin.js"></script>
</body>
</html>
