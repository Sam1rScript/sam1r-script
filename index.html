<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam1r Script</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-text">Sam1r <span class="logo-accent">Script</span></span>
            </div>
            <div class="header-right">
                <a href="https://t.me/sam1rscript" target="_blank" class="header-link">Telegram</a>
                <a href="https://github.com/sam1rscript" target="_blank" class="header-link">GitHub</a>
            </div>
        </div>
    </header>

    <div class="hero-wrapper" id="heroWrapper">
        <div class="hero-bg"></div>
        <div class="hero">
            <div class="hero-logo">
                <div class="logo-glow">
                    <img src="images/Logo2.png" alt="Sam1r Script" class="hero-logo-img" onerror="this.style.display='none'">
                    <div class="particles-container">
                        <span class="particle p1">✦</span>
                        <span class="particle p2">✦</span>
                        <span class="particle p3">✦</span>
                        <span class="particle p4">✦</span>
                        <span class="particle p5">✦</span>
                        <span class="particle p6">✦</span>
                        <span class="particle p7">✦</span>
                        <span class="particle p8">✦</span>
                        <span class="particle p9">✦</span>
                        <span class="particle p10">✦</span>
                        <span class="particle p11">✦</span>
                        <span class="particle p12">✦</span>
                    </div>
                </div>
            </div>
            <h1 class="hero-title">Sam1r <span class="accent">Script</span></h1>
            <p class="hero-subtitle">Твой гид в мире Roblox скриптов и эксплойтов</p>
        </div>
    </div>

    <main class="main">

        <section id="page-home" class="page active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="statScripts">0</div>
                    <div class="stat-label">Скриптов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statExploits">0</div>
                    <div class="stat-label">Эксплойтов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">156</div>
                    <div class="stat-label">Админов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">18</div>
                    <div class="stat-label">Обновлений</div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">Последние обновления</h2>
                <div class="scripts-list" id="recentScripts"></div>
            </div>

            <div class="section">
                <h2 class="section-title">Наши партнёры</h2>
                <div class="partners-list" id="partnersList"></div>
            </div>
        </section>

        <section id="page-scripts" class="page">
            <div class="section-header">
                <h2 class="section-title">Все скрипты</h2>
                <span class="count-badge" id="scriptsCount">0</span>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" id="scriptsSearch" placeholder="Поиск скриптов...">
                <select class="filter-select" id="scriptsFilter">
                    <option value="all">Все категории</option>
                    <option value="farm">Farm</option>
                    <option value="admin">Admin</option>
                    <option value="aim">Aim</option>
                    <option value="esp">ESP</option>
                    <option value="other">Other</option>
                </select>
                <select class="filter-select" id="modeFilter">
                    <option value="all">Все режимы</option>
                </select>
            </div>
            <div class="scripts-list" id="scriptsList"></div>
        </section>

        <section id="page-exploits" class="page">
            <h2 class="section-title">Эксплойты</h2>
            <div class="scripts-list" id="exploitsList"></div>
        </section>

        <section id="page-partners" class="page">
            <h2 class="section-title">Партнёры</h2>
            <p class="subtitle">Проекты, которые мы рекомендуем</p>
            <div class="partners-grid" id="partnersGrid"></div>
        </section>

    </main>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
