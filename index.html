<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam1r Script</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
        }

        .logo span {
            color: #8b5cf6;
        }

        .header-links {
            display: flex;
            gap: 16px;
        }

        .header-links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .header-links a:hover {
            color: #ffffff;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        /* ===== ЗАГОЛОВКИ ===== */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .section-title .accent {
            color: #8b5cf6;
        }

        /* ===== КАРТОЧКИ СКРИПТОВ ===== */
        .script {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .script:hover {
            border-color: rgba(139,92,246,0.2);
            background: rgba(255,255,255,0.05);
        }

        .script-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .script-name {
            font-size: 17px;
            font-weight: 600;
        }

        .script-tag {
            font-size: 11px;
            font-weight: 500;
            background: rgba(139,92,246,0.15);
            color: #8b5cf6;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .script-mode {
            font-size: 11px;
            font-weight: 500;
            background: rgba(6,182,212,0.15);
            color: #06b6d4;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .script-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin: 4px 0 8px;
        }

        .script-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 8px;
        }

        .script-code {
            background: rgba(255,255,255,0.04);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.04);
            position: relative;
        }

        .copy-btn {
            background: rgba(139,92,246,0.15);
            color: #8b5cf6;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            float: right;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: rgba(139,92,246,0.25);
        }

        .copy-btn.copied {
            background: rgba(52,211,153,0.2);
            color: #34d399;
        }

        /* ===== ПУСТОЕ СОСТОЯНИЕ ===== */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.2);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.2);
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        .error {
            text-align: center;
            padding: 40px 20px;
            color: #ef4444;
        }

        /* ===== ПАРТНЁРЫ ===== */
        .partners {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .partner {
            padding: 8px 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 600px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .script-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ШАПКА ===== -->
        <header class="header">
            <div class="logo">Sam1r <span>Script</span></div>
            <div class="header-links">
                <a href="https://t.me/sam1rscript" target="_blank">Telegram</a>
                <a href="https://github.com/sam1rscript" target="_blank">GitHub</a>
            </div>
        </header>

        <!-- ===== СТАТИСТИКА ===== -->
        <div class="stats" id="stats">
            <div class="stat">
                <div class="stat-number" id="statScripts">0</div>
                <div class="stat-label">Скриптов</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="statExploits">0</div>
                <div class="stat-label">Эксплойтов</div>
            </div>
            <div class="stat">
                <div class="stat-number">156</div>
                <div class="stat-label">Админов</div>
            </div>
            <div class="stat">
                <div class="stat-number">18</div>
                <div class="stat-label">Обновлений</div>
            </div>
        </div>

        <!-- ===== ПОСЛЕДНИЕ ОБНОВЛЕНИЯ ===== -->
        <div class="section-title">📌 Последние <span class="accent">обновления</span></div>
        <div id="recentList"></div>

        <!-- ===== ВСЕ СКРИПТЫ ===== -->
        <div style="margin-top: 40px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;">
                <div class="section-title" style="margin-bottom:0;">📜 Все <span class="accent">скрипты</span></div>
                <span style="color:rgba(255,255,255,0.2); font-size:14px;" id="countLabel">0</span>
            </div>

            <!-- ПОИСК И ФИЛЬТРЫ -->
            <div style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;">
                <input type="text" id="searchInput" placeholder="🔍 Поиск..." style="flex:1; min-width:150px; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); color:#fff; font-size:14px; outline:none;">
                <select id="categoryFilter" style="padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.6); font-size:14px; outline:none; cursor:pointer;">
                    <option value="all">Все категории</option>
                    <option value="farm">Farm</option>
                    <option value="admin">Admin</option>
                    <option value="aim">Aim</option>
                    <option value="esp">ESP</option>
                    <option value="other">Other</option>
                </select>
                <select id="modeFilter" style="padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.6); font-size:14px; outline:none; cursor:pointer;">
                    <option value="all">Все режимы</option>
                </select>
            </div>

            <div id="scriptsList">
                <div class="loading">Загрузка</div>
            </div>
        </div>

        <!-- ===== ПАРТНЁРЫ ===== -->
        <div style="margin-top: 40px;">
            <div class="section-title">🤝 Наши <span class="accent">партнёры</span></div>
            <div class="partners" id="partnersList">
                <span class="partner">Crystal Hub</span>
                <span class="partner">DarkX Hub</span>
                <span class="partner">Lunar Scripts</span>
            </div>
        </div>

        <!-- ===== ПОДВАЛ ===== -->
        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.04); text-align:center; color:rgba(255,255,255,0.15); font-size:13px;">
            Sam1r Script — просто скрипты для Roblox
        </div>

    </div>

    <script>
        var JSON_URL = 'https://raw.githubusercontent.com/Sam1rScript/sam1r-script/main/data/scripts.json';

        var allScripts = [];
        var partners = [];

        function loadData() {
            fetch(JSON_URL + '?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('Ошибка: ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    allScripts = data.scripts || [];
                    partners = data.partners || [];
                    renderAll();
                    updateFilters();
                })
                .catch(function(error) {
                    document.getElementById('scriptsList').innerHTML = '<div class="error">Ошибка загрузки: ' + error.message + '</div>';
                });
        }

        function renderAll() {
            renderStats();
            renderRecent();
            renderScripts();
            renderPartners();
        }

        function renderStats() {
            document.getElementById('statScripts').textContent = allScripts.length;
            document.getElementById('statExploits').textContent = 0;
            document.getElementById('countLabel').textContent = allScripts.length + ' скриптов';
        }

        function renderRecent() {
            var container = document.getElementById('recentList');
            var recent = allScripts.slice(-3).reverse();
            if (!recent.length) {
                container.innerHTML = '<div class="empty">Нет скриптов</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < recent.length; i++) {
                html += createScriptHTML(recent[i]);
            }
            container.innerHTML = html;
        }

        function renderScripts() {
            var container = document.getElementById('scriptsList');
            var search = document.getElementById('searchInput').value.toLowerCase();
            var category = document.getElementById('categoryFilter').value;
            var mode = document.getElementById('modeFilter').value;

            var filtered = allScripts.filter(function(s) {
                var match = true;
                if (category !== 'all' && s.category !== category) match = false;
                if (mode !== 'all' && s.mode !== mode) match = false;
                if (search && !s.name.toLowerCase().includes(search) && !s.desc.toLowerCase().includes(search)) match = false;
                return match;
            });

            if (!filtered.length) {
                container.innerHTML = '<div class="empty">Скриптов не найдено</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                html += createScriptHTML(filtered[i]);
            }
            container.innerHTML = html;
        }

        function createScriptHTML(s) {
            var modeLabel = s.mode ? s.mode.toUpperCase().replace(/_/g, ' ') : '';
            var tag = s.category ? '<span class="script-tag">' + s.category + '</span>' : '';
            var modeTag = s.mode ? '<span class="script-mode">' + modeLabel + '</span>' : '';

            return '<div class="script">' +
                '<div class="script-header">' +
                '<span class="script-name">' + (s.name || 'Без названия') + '</span>' +
                tag + modeTag +
                '</div>' +
                '<div class="script-desc">' + (s.desc || '') + '</div>' +
                '<div class="script-meta">' + (s.date || '') + '</div>' +
                '<div class="script-code">' +
                '<button class="copy-btn" onclick="copyCode(this, \'' + s.code.replace(/'/g, "\\'") + '\')">Копировать</button>' +
                s.code +
                '</div>' +
                '</div>';
        }

        function copyCode(btn, code) {
            navigator.clipboard.writeText(code).then(function() {
                btn.textContent = 'Скопировано!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Копировать';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                var textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = 'Скопировано!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Копировать';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function renderPartners() {
            var container = document.getElementById('partnersList');
            if (!partners.length) {
                container.innerHTML = '<span class="partner" style="color:rgba(255,255,255,0.2);">Пока нет партнёров</span>';
                return;
            }
            var html = '';
            for (var i = 0; i < partners.length; i++) {
                html += '<span class="partner">' + partners[i].name + '</span>';
            }
            container.innerHTML = html;
        }

        function updateFilters() {
            var select = document.getElementById('modeFilter');
            var current = select.value;
            var modes = {};
            for (var i = 0; i < allScripts.length; i++) {
                if (allScripts[i].mode) {
                    modes[allScripts[i].mode] = true;
                }
            }
            var keys = Object.keys(modes).sort();
            select.innerHTML = '<option value="all">Все режимы</option>';
            for (var i = 0; i < keys.length; i++) {
                var label = keys[i].toUpperCase().replace(/_/g, ' ');
                select.innerHTML += '<option value="' + keys[i] + '">' + label + '</option>';
            }
            if (current) select.value = current;
        }

        function filterScripts() {
            renderScripts();
        }

        document.getElementById('searchInput').addEventListener('input', filterScripts);
        document.getElementById('categoryFilter').addEventListener('change', filterScripts);
        document.getElementById('modeFilter').addEventListener('change', filterScripts);

        loadData();

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) loadData();
        });
    </script>

</body>
</html>
