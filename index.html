<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam1r Script</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
        }

        .logo span {
            color: #8b5cf6;
        }

        .header-links {
            display: flex;
            gap: 16px;
        }

        .header-links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .header-links a:hover {
            color: #ffffff;
        }

        .hero {
            text-align: center;
            padding: 30px 20px 40px;
        }

        .hero h1 {
            font-size: 40px;
            font-weight: 800;
        }

        .hero h1 span {
            color: #8b5cf6;
        }

        .hero p {
            color: rgba(255,255,255,0.4);
            font-size: 18px;
            margin-top: 6px;
        }

        .panels {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .panel-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
        }

        .panel-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(139,92,246,0.2);
        }

        .panel-btn.active {
            border-color: #8b5cf6;
            background: rgba(139,92,246,0.08);
        }

        .panel-btn .number {
            font-size: 28px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }

        .panel-btn .label {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .section-title .accent {
            color: #8b5cf6;
        }

        .script {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .script:hover {
            border-color: rgba(139,92,246,0.2);
            background: rgba(255,255,255,0.05);
        }

        .script-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .script-name {
            font-size: 17px;
            font-weight: 600;
        }

        .script-tag {
            font-size: 11px;
            font-weight: 500;
            background: rgba(139,92,246,0.15);
            color: #8b5cf6;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .script-mode {
            font-size: 11px;
            font-weight: 500;
            background: rgba(6,182,212,0.15);
            color: #06b6d4;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .script-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin: 4px 0 8px;
        }

        .script-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 8px;
        }

        .script-code {
            background: rgba(255,255,255,0.04);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.04);
            position: relative;
        }

        .copy-btn {
            background: rgba(139,92,246,0.15);
            color: #8b5cf6;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            float: right;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: rgba(139,92,246,0.25);
        }

        .copy-btn.copied {
            background: rgba(52,211,153,0.2);
            color: #34d399;
        }

        .exploit {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .exploit:hover {
            border-color: rgba(139,92,246,0.2);
            background: rgba(255,255,255,0.05);
        }

        .exploit-info {
            flex: 1;
        }

        .exploit-name {
            font-size: 17px;
            font-weight: 600;
        }

        .exploit-version {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-left: 8px;
        }

        .exploit-details {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        .exploit-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .exploit-status.updated {
            color: #34d399;
            background: rgba(52,211,153,0.1);
        }

        .exploit-status.not-updated {
            color: #f59e0b;
            background: rgba(245,158,11,0.1);
        }

        .exploit-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .exploit-status.updated .dot {
            background: #34d399;
        }

        .exploit-status.not-updated .dot {
            background: #f59e0b;
        }

        .exploit-price {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            margin-left: 12px;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.2);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.2);
        }

        .error {
            text-align: center;
            padding: 40px 20px;
            color: #ef4444;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .count-label {
            color: rgba(255,255,255,0.2);
            font-size: 14px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            border-color: rgba(139,92,246,0.3);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .filter-select {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .filter-select option {
            background: #1a1a2e;
            color: #ffffff;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
            text-align: center;
            color: rgba(255,255,255,0.15);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .panels {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .script-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-bar {
                flex-direction: column;
            }
            .search-input {
                min-width: unset;
            }
            .filter-select {
                width: 100%;
            }
            .hero h1 {
                font-size: 28px;
            }
            .hero p {
                font-size: 15px;
            }
            .exploit {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <header class="header">
            <div class="logo">Sam1r <span>Script</span></div>
            <div class="header-links">
                <a href="https://t.me/sam1rscript" target="_blank">Telegram</a>
                <a href="https://discord.gg/X9EYnyxy6t" target="_blank">Discord</a>
            </div>
        </header>

        <div class="hero">
            <h1>Sam1r <span>Script</span></h1>
            <p>Твой выбор в мире Roblox скриптов и эксплойтов</p>
        </div>

        <div class="panels">
            <button class="panel-btn" data-tab="scripts" onclick="switchTab('scripts')">
                <span class="number" id="panelScripts">0</span>
                <span class="label">Скрипты</span>
            </button>
            <button class="panel-btn active" data-tab="exploits" onclick="switchTab('exploits')">
                <span class="number" id="panelExploits">11</span>
                <span class="label">Эксплойты</span>
            </button>
            <button class="panel-btn" data-tab="admins" onclick="switchTab('admins')">
                <span class="number">3</span>
                <span class="label">Админы</span>
            </button>
            <button class="panel-btn" data-tab="subs" onclick="switchTab('subs')">
                <span class="number">750+</span>
                <span class="label">Подписчики</span>
            </button>
        </div>

        <div id="content-scripts" class="content-section">
            <div class="top-bar">
                <div class="section-title" style="margin-bottom:0;">Все скрипты</div>
                <span class="count-label" id="countLabel">0</span>
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск скриптов...">
                <select class="filter-select" id="categoryFilter">
                    <option value="all">Все категории</option>
                    <option value="farm">Farm</option>
                    <option value="admin">Admin</option>
                    <option value="aim">Aim</option>
                    <option value="esp">ESP</option>
                    <option value="other">Other</option>
                </select>
                <select class="filter-select" id="modeFilter">
                    <option value="all">Все режимы</option>
                </select>
            </div>

            <div id="scriptsList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>

        <div id="content-exploits" class="content-section active">
            <div class="top-bar">
                <div class="section-title" style="margin-bottom:0;">Windows Script Executor Exploits</div>
                <span class="count-label">11 эксплойтов</span>
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" id="exploitSearch" placeholder="Поиск эксплойтов..." oninput="filterExploits()">
                <select class="filter-select" id="exploitFilter" onchange="filterExploits()">
                    <option value="all">Все статусы</option>
                    <option value="updated">Обновлены</option>
                    <option value="not-updated">Не обновлены</option>
                </select>
            </div>

            <div id="exploitsList"></div>
        </div>

        <div id="content-admins" class="content-section">
            <div class="section-title">Админы</div>
            <div class="empty">Скоро появятся</div>
        </div>

        <div id="content-subs" class="content-section">
            <div class="section-title">Подписчики</div>
            <div class="empty">Скоро появятся</div>
        </div>

        <div class="footer">
            &copy; 2026 Sam1r Script. Все права защищены.
        </div>

    </div>

    <script>
        // ===== ДАННЫЕ ЭКСПЛОЙТОВ =====
        var exploitsData = [
            { name: "Volt", version: "1.2.26.2", sUNC: true, price: "$5.99 Weekly", lastUpdated: "07/03/2026 at 7:58 PM UTC", status: "not-updated" },
            { name: "Potassium", version: "2.2.8", sUNC: true, price: "$22.99 Lifetime", lastUpdated: "07/08/2026 at 1:08 PM UTC", status: "updated" },
            { name: "Wave", version: "NEW-1.3.8", sUNC: true, price: "$5.99 Weekly", lastUpdated: "07/07/2026 at 11:40 PM UTC", status: "updated" },
            { name: "Synapse Z", version: "1.0.3.1", sUNC: true, price: "$3.99 Weekly", lastUpdated: "06/29/2026 at 8:38 PM UTC", status: "not-updated" },
            { name: "Seliware", version: "2.4.9", sUNC: true, price: "$3.99 Weekly", lastUpdated: "05/23/2026 at 8:21 AM UTC", status: "not-updated" },
            { name: "Madium", version: "1.6.2", sUNC: true, price: "Free", lastUpdated: "07/08/2026 at 11:09 AM UTC", status: "updated" },
            { name: "Cosmic", version: "0.727", sUNC: true, price: "$15 Lifetime", lastUpdated: "06/28/2026 at 9:08 PM UTC", status: "not-updated" },
            { name: "Velocity", version: "1.1.1", sUNC: true, price: "Key System", lastUpdated: "07/08/2026 at 12:16 PM UTC", status: "updated" },
            { name: "SirHurt", version: "v5.447", sUNC: true, price: "$2.80 Weekly", lastUpdated: "07/07/2026 at 4:01 PM UTC", status: "updated" },
            { name: "Solara", version: "3.261", sUNC: true, price: "Free", lastUpdated: "07/07/2026 at 6:16 PM UTC", status: "updated" },
            { name: "Xeno", version: "1.3.55", sUNC: true, price: "Free", lastUpdated: "07/07/2026 at 4:01 PM UTC", status: "updated" }
        ];

        // ===== ОТОБРАЖЕНИЕ ЭКСПЛОЙТОВ =====
        function renderExploits(filter, search) {
            var container = document.getElementById('exploitsList');
            var filtered = exploitsData;

            if (filter && filter !== 'all') {
                filtered = filtered.filter(function(e) { return e.status === filter; });
            }

            if (search) {
                var s = search.toLowerCase();
                filtered = filtered.filter(function(e) {
                    return e.name.toLowerCase().includes(s) || e.version.toLowerCase().includes(s);
                });
            }

            if (!filtered.length) {
                container.innerHTML = '<div class="empty">Эксплойтов не найдено</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var e = filtered[i];
                var statusLabel = e.status === 'updated' ? 'Updated' : 'Not Updated';
                var statusClass = e.status === 'updated' ? 'updated' : 'not-updated';
                var sUNC = e.sUNC ? 'sUNC' : '';

                html += '<div class="exploit">';
                html += '<div class="exploit-info">';
                html += '<span class="exploit-name">' + e.name + '</span>';
                html += '<span class="exploit-version">' + e.version + '</span>';
                html += '<span class="exploit-price">' + e.price + '</span>';
                html += '<div class="exploit-details">' + sUNC + ' | Last updated: ' + e.lastUpdated + '</div>';
                html += '</div>';
                html += '<div class="exploit-status ' + statusClass + '">';
                html += '<span class="dot"></span>';
                html += statusLabel;
                html += '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }

        function filterExploits() {
            var filter = document.getElementById('exploitFilter').value;
            var search = document.getElementById('exploitSearch').value;
            renderExploits(filter, search);
        }

        // ===== ЗАГРУЗКА СКРИПТОВ =====
        var JSON_URL = 'https://raw.githubusercontent.com/Sam1rScript/sam1r-script/main/data/scripts.json';
        var allScripts = [];
        var isLoading = false;

        function loadData() {
            if (isLoading) return;
            isLoading = true;

            var listEl = document.getElementById('scriptsList');
            if (listEl) {
                listEl.innerHTML = '<div class="loading">Загрузка...</div>';
            }

            fetch(JSON_URL + '?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('Ошибка: ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    allScripts = data.scripts || [];
                    renderAll();
                    updateFilters();
                    isLoading = false;
                })
                .catch(function(error) {
                    var listEl = document.getElementById('scriptsList');
                    if (listEl) {
                        listEl.innerHTML = '<div class="error">Ошибка загрузки: ' + error.message + '</div>';
                    }
                    isLoading = false;
                });
        }

        function renderAll() {
            renderStats();
            renderScripts();
        }

        function renderStats() {
            var panelScripts = document.getElementById('panelScripts');
            var panelExploits = document.getElementById('panelExploits');
            var countLabel = document.getElementById('countLabel');

            if (panelScripts) {
                panelScripts.textContent = allScripts.length;
            }
            if (panelExploits) {
                panelExploits.textContent = exploitsData.length;
            }
            if (countLabel) {
                countLabel.textContent = allScripts.length + ' скриптов';
            }
        }

        function renderScripts() {
            var container = document.getElementById('scriptsList');
            if (!container) return;

            var searchInput = document.getElementById('searchInput');
            var categoryFilter = document.getElementById('categoryFilter');
            var modeFilter = document.getElementById('modeFilter');

            var search = searchInput ? searchInput.value.toLowerCase() : '';
            var category = categoryFilter ? categoryFilter.value : 'all';
            var mode = modeFilter ? modeFilter.value : 'all';

            var filtered = allScripts.filter(function(s) {
                var match = true;
                if (category !== 'all' && s.category !== category) match = false;
                if (mode !== 'all' && s.mode !== mode) match = false;
                if (search && !s.name.toLowerCase().includes(search) && !s.desc.toLowerCase().includes(search)) match = false;
                return match;
            });

            if (!filtered.length) {
                container.innerHTML = '<div class="empty">Скриптов не найдено</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                html += createScriptHTML(filtered[i]);
            }
            container.innerHTML = html;
        }

        function createScriptHTML(s) {
            var modeLabel = s.mode ? s.mode.toUpperCase().replace(/_/g, ' ') : '';
            var tag = s.category ? '<span class="script-tag">' + s.category + '</span>' : '';
            var modeTag = s.mode ? '<span class="script-mode">' + modeLabel + '</span>' : '';

            return '<div class="script">' +
                '<div class="script-header">' +
                '<span class="script-name">' + (s.name || 'Без названия') + '</span>' +
                tag + modeTag +
                '</div>' +
                '<div class="script-desc">' + (s.desc || '') + '</div>' +
                '<div class="script-meta">' + (s.date || '') + '</div>' +
                '<div class="script-code">' +
                '<button class="copy-btn" onclick="copyCode(this, \'' + s.code.replace(/'/g, "\\'") + '\')">Копировать</button>' +
                s.code +
                '</div>' +
                '</div>';
        }

        function copyCode(btn, code) {
            navigator.clipboard.writeText(code).then(function() {
                btn.textContent = 'Скопировано!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Копировать';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                var textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = 'Скопировано!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Копировать';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function updateFilters() {
            var select = document.getElementById('modeFilter');
            if (!select) return;

            var current = select.value;
            var modes = {};
            for (var i = 0; i < allScripts.length; i++) {
                if (allScripts[i].mode) {
                    modes[allScripts[i].mode] = true;
                }
            }
            var keys = Object.keys(modes).sort();
            select.innerHTML = '<option value="all">Все режимы</option>';
            for (var i = 0; i < keys.length; i++) {
                var label = keys[i].toUpperCase().replace(/_/g, ' ');
                select.innerHTML += '<option value="' + keys[i] + '">' + label + '</option>';
            }
            if (current) select.value = current;
        }

        function filterScripts() {
            renderScripts();
        }

        function switchTab(tab) {
            document.querySelectorAll('.panel-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            document.querySelectorAll('.content-section').forEach(function(el) {
                el.classList.remove('active');
            });

            var target = document.getElementById('content-' + tab);
            if (target) target.classList.add('active');

            if (tab === 'scripts') {
                setTimeout(function() {
                    renderScripts();
                }, 100);
            }
            if (tab === 'exploits') {
                setTimeout(function() {
                    renderExploits('all', '');
                }, 100);
            }
        }

        var searchInput = document.getElementById('searchInput');
        var categoryFilter = document.getElementById('categoryFilter');
        var modeFilter = document.getElementById('modeFilter');

        if (searchInput) {
            searchInput.addEventListener('input', filterScripts);
        }
        if (categoryFilter) {
            categoryFilter.addEventListener('change', filterScripts);
        }
        if (modeFilter) {
            modeFilter.addEventListener('change', filterScripts);
        }

        // Инициализация
        renderExploits('all', '');
        loadData();

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) loadData();
        });
    </script>

</body>
</html>
