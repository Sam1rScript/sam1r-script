<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sam1r Script</title>
    <style>
        /* ——— ОРИГИНАЛЬНЫЙ СТИЛЬ (без изменений) ——— */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1020px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
        }
        .logo span {
            color: #8b5cf6;
        }
        .header-links {
            display: flex;
            gap: 16px;
        }
        .header-links a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .header-links a:hover {
            color: #ffffff;
        }
        .hero {
            text-align: center;
            padding: 30px 20px 40px;
        }
        .hero h1 {
            font-size: 40px;
            font-weight: 800;
        }
        .hero h1 span {
            color: #8b5cf6;
        }
        .hero p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            margin-top: 6px;
        }
        .panels {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        .panel-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
        }
        .panel-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(139, 92, 246, 0.2);
        }
        .panel-btn.active {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.08);
        }
        .panel-btn .number {
            font-size: 28px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }
        .panel-btn .label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .section-title .accent {
            color: #8b5cf6;
        }
        .exploit-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .exploit-card:hover {
            border-color: rgba(139, 92, 246, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
        .exploit-info {
            flex: 1;
            min-width: 150px;
        }
        .exploit-name {
            font-size: 17px;
            font-weight: 600;
        }
        .exploit-version {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 8px;
        }
        .exploit-meta {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }
        .exploit-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
        }
        .status-updated {
            color: #34d399;
        }
        .status-outdated {
            color: #ef4444;
        }
        .status-unknown {
            color: #fbbf24;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-updated {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }
        .badge-outdated {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .badge-unknown {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }
        .exploit-cost {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .exploit-free {
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.2);
        }
        .exploit-platform {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 8px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.3);
        }
        .script {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .script:hover {
            border-color: rgba(139, 92, 246, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
        .script-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .script-name {
            font-size: 17px;
            font-weight: 600;
        }
        .script-tag {
            font-size: 11px;
            font-weight: 500;
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .script-mode {
            font-size: 11px;
            font-weight: 500;
            background: rgba(6, 182, 212, 0.15);
            color: #06b6d4;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .script-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin: 4px 0 8px;
        }
        .script-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 8px;
        }
        .script-code {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
        }
        .copy-btn {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            float: right;
            margin-left: 10px;
        }
        .copy-btn:hover {
            background: rgba(139, 92, 246, 0.25);
        }
        .copy-btn.copied {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.2);
        }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.2);
        }
        .error {
            text-align: center;
            padding: 40px 20px;
            color: #ef4444;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .count-label {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus {
            border-color: rgba(139, 92, 246, 0.3);
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .filter-select {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .filter-select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 13px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot-updated {
            background: #34d399;
        }
        .dot-outdated {
            background: #ef4444;
        }
        .dot-unknown {
            background: #fbbf24;
        }

        /* ——— НОВЫЙ СТИЛЬ ДЛЯ КОЛОНОК ЭКСПЛОЙТОВ ——— */
        .exploit-columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-top: 6px;
        }
        .exploit-column {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 14px 14px 6px;
        }
        .exploit-column .column-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }
        .exploit-column .column-title .count {
            color: rgba(255, 255, 255, 0.15);
            font-weight: 400;
            margin-left: 6px;
        }
        /* карточки внутри колонок — компактнее */
        .exploit-column .exploit-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            flex-direction: column;
            align-items: stretch;
            gap: 4px;
        }
        .exploit-column .exploit-card:hover {
            border-color: rgba(139, 92, 246, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }
        .exploit-column .exploit-info {
            min-width: unset;
        }
        .exploit-column .exploit-name {
            font-size: 15px;
        }
        .exploit-column .exploit-version {
            font-size: 12px;
            margin-left: 4px;
            color: rgba(255, 255, 255, 0.25);
        }
        .exploit-column .exploit-meta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 0;
        }
        .exploit-column .exploit-status {
            font-size: 12px;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .exploit-column .status-badge {
            padding: 2px 10px;
            font-size: 10px;
        }
        .exploit-column .exploit-cost {
            font-size: 11px;
            padding: 2px 10px;
        }
        .exploit-column .exploit-platform {
            display: none;
        }
        .exploit-column .status-dot {
            width: 6px;
            height: 6px;
            margin-right: 4px;
        }

        /* две колонки на планшете, одна на телефоне */
        @media (max-width: 820px) {
            .exploit-columns {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 560px) {
            .exploit-columns {
                grid-template-columns: 1fr;
            }
            .panels {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .script-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-bar {
                flex-direction: column;
            }
            .search-input {
                min-width: unset;
            }
            .filter-select {
                width: 100%;
            }
            .hero h1 {
                font-size: 28px;
            }
            .hero p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <header class="header">
            <div class="logo">Sam1r <span>Script</span></div>
            <div class="header-links">
                <a href="https://t.me/sam1rscript" target="_blank">Telegram</a>
                <a href="https://discord.gg/X9EYnyxy6t" target="_blank">Discord</a>
            </div>
        </header>

        <div class="hero">
            <h1>Sam1r <span>Script</span></h1>
            <p>Твой выбор в мире Roblox скриптов и эксплойтов</p>
        </div>

        <div class="panels">
            <button class="panel-btn active" data-tab="scripts" onclick="switchTab('scripts')">
                <span class="number" id="panelScripts">0</span>
                <span class="label">Скрипты</span>
            </button>
            <button class="panel-btn" data-tab="exploits" onclick="switchTab('exploits')">
                <span class="number" id="panelExploits">0</span>
                <span class="label">Эксплойты</span>
            </button>
            <button class="panel-btn" data-tab="admins" onclick="switchTab('admins')">
                <span class="number">3</span>
                <span class="label">Админы</span>
            </button>
            <button class="panel-btn" data-tab="subs" onclick="switchTab('subs')">
                <span class="number">750+</span>
                <span class="label">Подписчики</span>
            </button>
        </div>

        <!-- СКРИПТЫ (без изменений) -->
        <div id="content-scripts" class="content-section active">
            <div class="top-bar">
                <div class="section-title" style="margin-bottom:0;">Все скрипты</div>
                <span class="count-label" id="countLabel">0</span>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск скриптов...">
                <select class="filter-select" id="categoryFilter">
                    <option value="all">Все категории</option>
                    <option value="farm">Farm</option>
                    <option value="admin">Admin</option>
                    <option value="aim">Aim</option>
                    <option value="esp">ESP</option>
                    <option value="other">Other</option>
                </select>
                <select class="filter-select" id="modeFilter">
                    <option value="all">Все режимы</option>
                </select>
            </div>
            <div id="scriptsList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>

        <!-- ЭКСПЛОЙТЫ — колонки по категориям -->
        <div id="content-exploits" class="content-section">
            <div class="top-bar">
                <div class="section-title" style="margin-bottom:0;">Эксплойты</div>
                <span class="count-label" id="exploitCount">0</span>
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" id="exploitSearch" placeholder="Поиск эксплойтов...">
                <select class="filter-select" id="exploitPlatformFilter">
                    <option value="all">Все платформы</option>
                    <option value="Windows">Windows</option>
                    <option value="Android">Android</option>
                    <option value="iOS">iOS</option>
                    <option value="Mac">Mac</option>
                </select>
                <select class="filter-select" id="exploitStatusFilter">
                    <option value="all">Все статусы</option>
                    <option value="updated">Обновлён</option>
                    <option value="outdated">Не обновлён</option>
                </select>
            </div>

            <div id="exploitsList">
                <div class="loading">Загрузка эксплойтов...</div>
            </div>
        </div>

        <div id="content-admins" class="content-section">
            <div class="section-title">Админы</div>
            <div class="empty">Скоро появятся</div>
        </div>

        <div id="content-subs" class="content-section">
            <div class="section-title">Подписчики</div>
            <div class="empty">Скоро появятся</div>
        </div>

        <div class="footer">
            &copy; 2026 Sam1r Script. Все права защищены.
        </div>

    </div>

    <script>
        // ——— ВЕСЬ ВАШ ОРИГИНАЛЬНЫЙ JS (без изменений) ———
        var JSON_URL = 'https://raw.githubusercontent.com/Sam1rScript/sam1r-script/main/data/scripts.json';
        var WEAO_API = 'https://weao.xyz/api/status/exploits';

        var allScripts = [];
        var allExploits = [];
        var isLoading = false;

        function loadData() {
            if (isLoading) return;
            isLoading = true;

            var listEl = document.getElementById('scriptsList');
            if (listEl) {
                listEl.innerHTML = '<div class="loading">Загрузка...</div>';
            }

            fetch(JSON_URL + '?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('Ошибка: ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    allScripts = data.scripts || [];
                    renderAll();
                    updateFilters();
                    isLoading = false;
                })
                .catch(function(error) {
                    var listEl = document.getElementById('scriptsList');
                    if (listEl) {
                        listEl.innerHTML = '<div class="error">Ошибка загрузки: ' + error.message + '</div>';
                    }
                    isLoading = false;
                });

            loadExploits();
        }

        function loadExploits() {
            var listEl = document.getElementById('exploitsList');
            if (listEl) {
                listEl.innerHTML = '<div class="loading">Загрузка эксплойтов...</div>';
            }

            fetch(WEAO_API)
                .then(function(response) {
                    if (!response.ok) throw new Error('Ошибка: ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    allExploits = data || [];
                    renderExploits();
                })
                .catch(function(error) {
                    var listEl = document.getElementById('exploitsList');
                    if (listEl) {
                        listEl.innerHTML = '<div class="error">Ошибка загрузки эксплойтов: ' + error.message + '</div>';
                    }
                });
        }

        function renderAll() {
            renderStats();
            renderScripts();
        }

        function renderStats() {
            var panelScripts = document.getElementById('panelScripts');
            var panelExploits = document.getElementById('panelExploits');
            var countLabel = document.getElementById('countLabel');

            if (panelScripts) {
                panelScripts.textContent = allScripts.length;
            }
            if (panelExploits) {
                panelExploits.textContent = allExploits.filter(function(e) {
                    return e.hidden !== true && e.private !== true;
                }).length;
            }
            if (countLabel) {
                countLabel.textContent = allScripts.length + ' скриптов';
            }
        }

        function renderScripts() {
            var container = document.getElementById('scriptsList');
            if (!container) return;

            var searchInput = document.getElementById('searchInput');
            var categoryFilter = document.getElementById('categoryFilter');
            var modeFilter = document.getElementById('modeFilter');

            var search = searchInput ? searchInput.value.toLowerCase() : '';
            var category = categoryFilter ? categoryFilter.value : 'all';
            var mode = modeFilter ? modeFilter.value : 'all';

            var filtered = allScripts.filter(function(s) {
                var match = true;
                if (category !== 'all' && s.category !== category) match = false;
                if (mode !== 'all' && s.mode !== mode) match = false;
                if (search && !s.name.toLowerCase().includes(search) && !s.desc.toLowerCase().includes(search)) match =
                    false;
                return match;
            });

            if (!filtered.length) {
                container.innerHTML = '<div class="empty">Скриптов не найдено</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                html += createScriptHTML(filtered[i]);
            }
            container.innerHTML = html;
        }

        function createScriptHTML(s) {
            var modeLabel = s.mode ? s.mode.toUpperCase().replace(/_/g, ' ') : '';
            var tag = s.category ? '<span class="script-tag">' + s.category + '</span>' : '';
            var modeTag = s.mode ? '<span class="script-mode">' + modeLabel + '</span>' : '';

            return '<div class="script">' +
                '<div class="script-header">' +
                '<span class="script-name">' + (s.name || 'Без названия') + '</span>' +
                tag + modeTag +
                '</div>' +
                '<div class="script-desc">' + (s.desc || '') + '</div>' +
                '<div class="script-meta">' + (s.date || '') + '</div>' +
                '<div class="script-code">' +
                '<button class="copy-btn" onclick="copyCode(this, \'' + s.code.replace(/'/g, "\\'") + '\')">Копировать</button>' +
                s.code +
                '</div>' +
                '</div>';
        }

        function copyCode(btn, code) {
            navigator.clipboard.writeText(code).then(function() {
                btn.textContent = 'Скопировано!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Копировать';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                var textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = 'Скопировано!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Копировать';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // ——— НОВЫЙ renderExploits: колонки по категориям ———
        function renderExploits() {
            var container = document.getElementById('exploitsList');
            if (!container) return;

            var searchInput = document.getElementById('exploitSearch');
            var platformFilter = document.getElementById('exploitPlatformFilter');
            var statusFilter = document.getElementById('exploitStatusFilter');

            var search = searchInput ? searchInput.value.toLowerCase() : '';
            var platform = platformFilter ? platformFilter.value : 'all';
            var status = statusFilter ? statusFilter.value : 'all';

            // Фильтруем
            var filtered = allExploits.filter(function(e) {
                if (e.hidden === true || e.private === true) return false;

                var match = true;
                if (platform !== 'all' && e.platform !== platform) match = false;
                if (status === 'updated' && e.updateStatus !== true) match = false;
                if (status === 'outdated' && e.updateStatus !== false) match = false;
                if (search && !e.title.toLowerCase().includes(search)) match = false;
                return match;
            });

            // Обновляем счётчики
            var countLabel = document.getElementById('exploitCount');
            if (countLabel) {
                countLabel.textContent = filtered.length + ' эксплойтов';
            }
            var panelExploits = document.getElementById('panelExploits');
            if (panelExploits) {
                panelExploits.textContent = allExploits.filter(function(e) {
                    return e.hidden !== true && e.private !== true;
                }).length;
            }

            if (!filtered.length) {
                container.innerHTML = '<div class="empty">Эксплойтов не найдено</div>';
                return;
            }

            // Категории: Windows Script Executor, Windows External, Mac, Android, iOS
            // Маппим платформу + тип (если есть) в категорию
            // Поскольку в данных нет явного типа, используем платформу + эвристику по названию
            var categories = {
                'Windows Script Executor': [],
                'Windows External': [],
                'Mac Script Executor': [],
                'Android Script Executor': [],
                'iOS Script Executor': []
            };

            // Эвристика: если в названии есть External, или это явно внешний
            var externalKeywords = ['external', 'injector', 'launcher', 'loader'];

            for (var i = 0; i < filtered.length; i++) {
                var e = filtered[i];
                var titleLower = e.title.toLowerCase();
                var isExternal = externalKeywords.some(function(kw) { return titleLower.includes(kw); });

                if (e.platform === 'Windows') {
                    if (isExternal) {
                        categories['Windows External'].push(e);
                    } else {
                        categories['Windows Script Executor'].push(e);
                    }
                } else if (e.platform === 'Mac') {
                    categories['Mac Script Executor'].push(e);
                } else if (e.platform === 'Android') {
                    categories['Android Script Executor'].push(e);
                } else if (e.platform === 'iOS') {
                    categories['iOS Script Executor'].push(e);
                } else {
                    // Fallback: по умолчанию в Windows Script Executor
                    categories['Windows Script Executor'].push(e);
                }
            }

            // Сортируем внутри каждой категории: сначала обновлённые
            for (var cat in categories) {
                categories[cat].sort(function(a, b) {
                    if (a.updateStatus === b.updateStatus) return 0;
                    if (a.updateStatus === true) return -1;
                    return 1;
                });
            }

            // Строим колонки: 3 колонки, заполняем категориями
            var columnOrder = [
                'Windows Script Executor',
                'Windows External',
                'Mac Script Executor',
                'Android Script Executor',
                'iOS Script Executor'
            ];

            // Распределяем по трём колонкам равномерно
            var columns = [
                { title: 'Windows Script Executor', items: categories['Windows Script Executor'] || [] },
                { title: 'Windows External', items: categories['Windows External'] || [] },
                { title: 'Mac Script Executor', items: categories['Mac Script Executor'] || [] },
                { title: 'Android Script Executor', items: categories['Android Script Executor'] || [] },
                { title: 'iOS Script Executor', items: categories['iOS Script Executor'] || [] }
            ];

            // Убираем пустые колонки
            var nonEmpty = columns.filter(function(col) { return col.items.length > 0; });

            // Если мало колонок, дублируем или оставляем как есть
            // Просто выводим все непустые колонки в сетку
            var html = '<div class="exploit-columns">';
            for (var c = 0; c < nonEmpty.length; c++) {
                var col = nonEmpty[c];
                html += '<div class="exploit-column">';
                html += '<div class="column-title">' + col.title + ' <span class="count">' + col.items.length + '</span></div>';
                for (var j = 0; j < col.items.length; j++) {
                    html += createExploitHTML(col.items[j]);
                }
                html += '</div>';
            }
            html += '</div>';

            container.innerHTML = html;
        }

        // ——— createExploitHTML — убираем эмодзи, чистая вёрстка ———
        function createExploitHTML(e) {
            var statusText = e.updateStatus ? 'Updated' : 'Not Updated';
            var statusClass = e.updateStatus ? 'status-updated' : 'status-outdated';
            var badgeClass = e.updateStatus ? 'badge-updated' : 'badge-outdated';
            var dotClass = e.updateStatus ? 'dot-updated' : 'dot-outdated';

            var costDisplay = e.cost || (e.free ? 'Free' : 'Unknown');
            var costClass = e.free ? 'exploit-free' : '';

            var uncDisplay = '';
            if (e.uncStatus === true) {
                uncDisplay = 'sUNC';
            } else if (e.uncStatus === false) {
                uncDisplay = 'sUNC';
            }

            // Без эмодзи
            return '<div class="exploit-card">' +
                '<div class="exploit-info">' +
                '<span class="exploit-name">' + e.title + '</span>' +
                '<span class="exploit-version">' + e.version + '</span>' +
                '<div class="exploit-meta">' +
                'Last updated: ' + e.updatedDate +
                (uncDisplay ? ' | ' + uncDisplay : '') +
                '</div>' +
                '</div>' +
                '<div class="exploit-status">' +
                '<span class="status-dot ' + dotClass + '"></span>' +
                '<span class="' + statusClass + '">' + statusText + '</span>' +
                '<span class="status-badge ' + badgeClass + '">' + (e.updateStatus ? 'Updated' : 'Not Updated') + '</span>' +
                '<span class="exploit-cost ' + costClass + '">' + costDisplay + '</span>' +
                '</div>' +
                '</div>';
        }

        function updateFilters() {
            var select = document.getElementById('modeFilter');
            if (!select) return;

            var current = select.value;
            var modes = {};
            for (var i = 0; i < allScripts.length; i++) {
                if (allScripts[i].mode) {
                    modes[allScripts[i].mode] = true;
                }
            }
            var keys = Object.keys(modes).sort();
            select.innerHTML = '<option value="all">Все режимы</option>';
            for (var i = 0; i < keys.length; i++) {
                var label = keys[i].toUpperCase().replace(/_/g, ' ');
                select.innerHTML += '<option value="' + keys[i] + '">' + label + '</option>';
            }
            if (current) select.value = current;
        }

        function filterScripts() {
            renderScripts();
        }

        function filterExploits() {
            renderExploits();
        }

        function switchTab(tab) {
            document.querySelectorAll('.panel-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            document.querySelectorAll('.content-section').forEach(function(el) {
                el.classList.remove('active');
            });

            var target = document.getElementById('content-' + tab);
            if (target) target.classList.add('active');

            if (tab === 'scripts') {
                setTimeout(function() {
                    renderScripts();
                }, 100);
            }

            if (tab === 'exploits') {
                setTimeout(function() {
                    renderExploits();
                }, 100);
            }
        }

        var searchInput = document.getElementById('searchInput');
        var categoryFilter = document.getElementById('categoryFilter');
        var modeFilter = document.getElementById('modeFilter');
        var exploitSearch = document.getElementById('exploitSearch');
        var exploitPlatformFilter = document.getElementById('exploitPlatformFilter');
        var exploitStatusFilter = document.getElementById('exploitStatusFilter');

        if (searchInput) {
            searchInput.addEventListener('input', filterScripts);
        }
        if (categoryFilter) {
            categoryFilter.addEventListener('change', filterScripts);
        }
        if (modeFilter) {
            modeFilter.addEventListener('change', filterScripts);
        }
        if (exploitSearch) {
            exploitSearch.addEventListener('input', filterExploits);
        }
        if (exploitPlatformFilter) {
            exploitPlatformFilter.addEventListener('change', filterExploits);
        }
        if (exploitStatusFilter) {
            exploitStatusFilter.addEventListener('change', filterExploits);
        }

        loadData();

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) loadData();
        });
    </script>

</body>
</html>
