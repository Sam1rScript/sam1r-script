<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam1r Script</title>
    <style>
        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .script {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .script h3 {
            margin: 0 0 6px 0;
            color: #8b5cf6;
        }
        .script p {
            margin: 4px 0;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .script .code {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            word-break: break-all;
            font-family: monospace;
            margin-top: 8px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.3);
        }
        .count {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1 style="color: #8b5cf6;">Sam1r Script</h1>
    <p style="color: rgba(255,255,255,0.4);">Прототип — скрипты загружаются из JSON</p>
    <p class="count" id="count">Скриптов: 0</p>
    <hr style="border-color: rgba(255,255,255,0.05); margin: 16px 0;">

    <div id="scriptsList">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        // ПРЯМАЯ ССЫЛКА НА JSON (без токенов)
        var JSON_URL = 'https://raw.githubusercontent.com/Sam1rScript/sam1r-script/main/data/scripts.json';

        function loadScripts() {
            var container = document.getElementById('scriptsList');
            var count = document.getElementById('count');
            
            fetch(JSON_URL + '?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('Ошибка: ' + response.status);
                    }
                    return response.json();
                })
                .then(function(data) {
                    var scripts = data.scripts || [];
                    count.textContent = 'Скриптов: ' + scripts.length;
                    
                    if (!scripts.length) {
                        container.innerHTML = '<div class="loading">Нет скриптов. Добавь в data/scripts.json</div>';
                        return;
                    }
                    
                    var html = '';
                    for (var i = 0; i < scripts.length; i++) {
                        var s = scripts[i];
                        html += '<div class="script">';
                        html += '<h3>' + s.name + '</h3>';
                        html += '<p>' + (s.desc || '') + '</p>';
                        html += '<p style="font-size:12px;color:rgba(255,255,255,0.2);">' + (s.category || '') + ' | ' + (s.mode || '') + ' | ' + (s.date || '') + '</p>';
                        html += '<div class="code">' + s.code + '</div>';
                        html += '</div>';
                    }
                    container.innerHTML = html;
                })
                .catch(function(error) {
                    container.innerHTML = '<div class="loading">Ошибка: ' + error.message + '</div>';
                });
        }

        // Загружаем при открытии
        loadScripts();

        // Обновляем при возврате на страницу
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                loadScripts();
            }
        });
    </script>

</body>
</html>
